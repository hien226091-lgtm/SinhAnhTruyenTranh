<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng nhập — AuraComic Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/studio.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:var(--bg-gradient); font-family:var(--font); }
    .auth-card { background:#fff; border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); display:flex; width:860px; max-width:100%; min-height:520px; overflow:hidden; }
    .auth-left { width:42%; background:linear-gradient(135deg, var(--primary-light), rgba(16,185,129,0.04)); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center; }
    .auth-left .logo-mark { font-size:28px; font-weight:800; color:var(--primary); margin-bottom:8px; letter-spacing:-0.5px; }
    .auth-left .brand-sub { color:var(--text-secondary); font-size:14px; line-height:1.6; }
    .auth-right { width:58%; padding:44px; display:flex; flex-direction:column; justify-content:center; }
    .auth-header { display:flex; justify-content:flex-end; margin-bottom:20px; }
    .toggle-tabs { display:inline-flex; background:var(--primary-light); border-radius:100px; padding:4px; }
    .tab { padding:8px 20px; font-size:13px; font-weight:600; color:var(--text-secondary); border-radius:100px; cursor:pointer; transition:all 0.2s; text-decoration:none; }
    .tab.active { background:#fff; color:var(--primary); box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .auth-right h3 { margin:0 0 4px; font-size:26px; color:var(--text); }
    .auth-right .sub { color:var(--text-secondary); font-size:14px; margin-bottom:24px; }
    .auth-form label { display:flex; justify-content:space-between; margin-top:18px; margin-bottom:6px; font-size:13px; font-weight:600; color:var(--text); }
    .auth-form .forgot { color:var(--primary); text-decoration:none; font-size:12px; }
    .auth-form .forgot:hover { text-decoration:underline; }
    .auth-form input { width:100%; padding:12px 14px; border-radius:var(--radius-md); border:1.5px solid var(--border); background:#fafcff; font-size:14px; font-family:var(--font); color:var(--text); transition:all 0.2s; outline:none; box-sizing:border-box; }
    .auth-form input:focus { border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-light); background:#fff; }
    .btn-primary { width:100%; margin-top:24px; padding:12px; font-size:14px; }
    .form-message { font-size:13px; padding:10px 14px; border-radius:var(--radius-sm); margin-top:12px; text-align:center; font-weight:500; display:none; background:#fee2e2; color:#991b1b; }
    .muted-text { color:var(--text-secondary); text-align:center; margin-top:20px; font-size:13px; }
    .link-bold { color:var(--primary); font-weight:600; text-decoration:none; }
    .link-bold:hover { text-decoration:underline; }
    .close-btn { position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%; background:var(--primary-light); color:var(--text-secondary); display:flex; align-items:center; justify-content:center; font-size:20px; text-decoration:none; transition:all 0.2s; border:1px solid var(--border); cursor:pointer; }
    .close-btn:hover { background:#fee2e2; color:#ef4444; transform:rotate(90deg); }
    .auth-card { position:relative; }
    .social-login { display:flex; gap:10px; margin-bottom:16px; }
    .btn-social { flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:10px; background:#fff; border:1.5px solid var(--border); border-radius:var(--radius-md); color:var(--text); font-size:13px; font-weight:600; font-family:var(--font); cursor:pointer; transition:all 0.2s; text-decoration:none; }
    .btn-social:hover { background:#f8fafc; border-color:var(--primary); transform:translateY(-1px); }
    .btn-social svg { width:18px; height:18px; }
    .divider { display:flex; align-items:center; text-align:center; margin-bottom:16px; color:var(--text-secondary); font-size:12px; }
    .divider::before, .divider::after { content:''; flex:1; border-bottom:1px solid var(--border); }
    .divider::before { margin-right:10px; }
    .divider::after { margin-left:10px; }
    @media (max-width:768px) {
      .auth-card { flex-direction:column; height:100vh; border-radius:0; box-shadow:none; width:100%; }
      .auth-left { width:100%; padding:28px 20px; }
      .auth-right { width:100%; padding:28px 20px; }
    }
  </style>
</head>
<body>
  <script>
    const theme = localStorage.getItem('app-theme') || 'green';
    document.documentElement.setAttribute('data-theme', theme);
  </script>

  <div class="auth-card">
    <a href="/ui" class="close-btn">&times;</a>
    <div class="auth-left">
      <div class="logo-mark">AuraComic Studio</div>
      <div class="brand-sub">Hệ thống sinh ảnh truyện tranh bằng Trí tuệ Nhân tạo.</div>
    </div>
    <div class="auth-right">
      <div class="auth-header">
        <div class="toggle-tabs">
          <a class="tab" href="/register">Tạo tài khoản</a>
          <span class="tab active">Đăng nhập</span>
        </div>
      </div>
      <h3>Chào mừng trở lại</h3>
      <p class="sub">Đăng nhập để tiếp tục sáng tạo với AuraComic.</p>

      <div class="social-login">
        <a href="/api/auth/google/login" class="btn-social">
          <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
          Google
        </a>
        <a href="/api/auth/github/login" class="btn-social" style="background:#24292f;color:#fff;border-color:#24292f">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </a>
      </div>

      <div class="divider">Hoặc tiếp tục với</div>

      <form class="auth-form" id="loginForm">
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label>Mật khẩu <a class="forgot" href="#">Quên?</a></label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <div id="formMessage" class="form-message"></div>
        <button class="btn btn-primary" type="submit">Đăng nhập</button>
        <p class="muted-text">Chưa có tài khoản? <a href="/register" class="link-bold">Đăng ký ngay</a></p>
      </form>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      if (token) {
        localStorage.setItem('access_token', token);
        const url = new URL(location.href);
        url.searchParams.delete('token');
        url.searchParams.delete('oauth');
        location.href = '/ui';
      }
    })();
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('loginForm');
      const msg = document.getElementById('formMessage');
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = form.querySelector('button[type=submit]');
        msg.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Đang đăng nhập...';
        const email = form.querySelector('input[name="email"]').value.trim();
        const password = form.querySelector('input[name="password"]').value;
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: email, password })
          });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.access_token) {
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('user_email', email);
            window.location.href = data.is_admin ? '/admin' : '/ui';
          } else {
            msg.textContent = data.detail || 'Email hoặc mật khẩu không chính xác.';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Đăng nhập';
          }
        } catch (err) {
          msg.textContent = 'Lỗi kết nối máy chủ.';
          msg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Đăng nhập';
        }
      });
    });
  </script>
</body>
</html>
